<svg width="500" height="150" viewBox="0 0 500 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"></feGaussianBlur>
      <feMerge> 
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"></rect>

  <!-- Decorative lines -->
  <path d="M50 100 Q150 20 250 100 T450 100" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.4"></path>

  <!-- Circle tech element -->
  <circle cx="80" cy="75" r="25" fill="none" stroke="url(#grad1)" stroke-width="3" filter="url(#glow)"></circle>

  <!-- Text -->
  <text x="120" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="42" fill="url(#grad1)" font-weight="600" filter="url(#glow)">
    LuckTech
  </text>

  <!-- Small accent dots -->
  <circle cx="420" cy="50" r="3" fill="#00f2fe"></circle>
  <circle cx="440" cy="70" r="2" fill="#4facfe"></circle>
  <circle cx="400" cy="90" r="2.5" fill="#00f2fe"></circle>
</svg>